<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 140" role="img" aria-label="Echo Engineering PLC">
  <defs>
    <linearGradient id="hE" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2c5294"/>
      <stop offset="100%" stop-color="#1a3a6e"/>
    </linearGradient>
    <linearGradient id="hWave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b9bb0" stop-opacity="0.5"/>
      <stop offset="30%" stop-color="#7a8a9e"/>
      <stop offset="70%" stop-color="#9ba8b8"/>
      <stop offset="100%" stop-color="#6b7d96" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="hSig" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ffa726"/>
    </linearGradient>
  </defs>

  <!-- ====== MARK (positioned 10, 20, scaled to 100x100) ====== -->
  <g transform="translate(10,20)">
    <g fill="url(#hE)">
      <rect x="20" y="22" width="9" height="56" rx="1.5"/>
      <rect x="20" y="22" width="38" height="9" rx="1.5"/>
      <rect x="20" y="45.5" width="34" height="9" rx="1.5"/>
      <rect x="20" y="69" width="38" height="9" rx="1.5"/>
    </g>
    <g fill="none" stroke="url(#hWave)" stroke-width="3.6" stroke-linecap="round">
      <path d="M 30 26.5 q 3.5 -5.5 7 0 t 7 0 t 7 0 t 7 0"/>
      <path d="M 28 50    q 4   -6   8 0 t 8 0 t 8 0 t 8 0"/>
      <path d="M 30 73.5 q 3.5 -5.5 7 0 t 7 0 t 7 0 t 7 0"/>
    </g>
    <circle cx="68" cy="50" r="3.2" fill="url(#hSig)"/>
    <circle cx="68" cy="50" r="1.2" fill="#ffffff" opacity="0.95"/>
    <g fill="none" stroke="url(#hSig)" stroke-width="0.7" opacity="0.5">
      <circle cx="68" cy="50" r="6.5"/>
    </g>
  </g>

  <!-- Vertical divider -->
  <line x1="125" y1="35" x2="125" y2="105" stroke="#cfd8e3" stroke-width="1.5"/>

  <!-- ====== WORDMARK ====== -->
  <g font-family="'Arial Black','Helvetica Neue',Arial,sans-serif">
    <!-- ECHO (bold navy) -->
    <text x="145" y="72" font-size="52" font-weight="900" fill="#1a3a6e" letter-spacing="-1.5">ECHO</text>
    <!-- ENGINEERING PLC (lighter silver) -->
    <text x="145" y="105" font-size="26" font-weight="300" font-family="'Helvetica Neue',Arial,sans-serif" fill="#7a8a9e" letter-spacing="3">ENGINEERING PLC</text>
  </g>

  <!-- Tagline -->
  <g font-family="'Helvetica Neue',Arial,sans-serif">
    <text x="145" y="127" font-size="10" font-weight="600" fill="#1a3a6e" letter-spacing="3.5">CONNECTING ETHIOPIA · POWERING PROGRESS</text>
  </g>
  <!-- Accent stripe -->
  <rect x="145" y="36" width="40" height="3" rx="1.5" fill="url(#hSig)"/>
</svg>
