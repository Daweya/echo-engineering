<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Echo Engineering (orbital concept)">
  <defs>
    <linearGradient id="oBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1929"/>
      <stop offset="100%" stop-color="#15315a"/>
    </linearGradient>
    <linearGradient id="oSig" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#oBg)"/>

  <!-- Concentric orbital rings -->
  <g fill="none" stroke-linecap="round">
    <circle cx="50" cy="50" r="38" stroke="rgba(66,165,245,0.18)" stroke-width="1"/>
    <circle cx="50" cy="50" r="30" stroke="rgba(66,165,245,0.25)" stroke-width="1"/>
    <circle cx="50" cy="50" r="22" stroke="rgba(66,165,245,0.35)" stroke-width="1"/>
  </g>

  <!-- Network nodes along orbits -->
  <circle cx="50" cy="12" r="2.5" fill="#42a5f5"/>
  <circle cx="80" cy="50" r="2.5" fill="#ff6b35"/>
  <circle cx="20" cy="70" r="2" fill="#42a5f5"/>
  <circle cx="78" cy="22" r="1.5" fill="rgba(255,255,255,0.6)"/>

  <!-- Central E -->
  <g fill="#ffffff">
    <rect x="36" y="34" width="6" height="32" rx="1.5"/>
    <rect x="36" y="34" width="22" height="6" rx="1.5"/>
    <rect x="36" y="47" width="20" height="6" rx="1.5"/>
    <rect x="36" y="60" width="22" height="6" rx="1.5"/>
  </g>

  <!-- Connecting line from E to top node -->
  <line x1="50" y1="34" x2="50" y2="14" stroke="url(#oSig)" stroke-width="1.2" opacity="0.6"/>
</svg>
