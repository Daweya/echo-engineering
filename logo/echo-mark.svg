<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Echo Engineering">
  <defs>
    <linearGradient id="echoBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1929"/>
      <stop offset="55%" stop-color="#0f2440"/>
      <stop offset="100%" stop-color="#1e88e5"/>
    </linearGradient>
    <linearGradient id="echoSignal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ffa726"/>
    </linearGradient>
    <filter id="echoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square backdrop -->
  <rect width="100" height="100" rx="22" fill="url(#echoBg)"/>

  <!-- Subtle inner ring for depth -->
  <rect x="1.5" y="1.5" width="97" height="97" rx="20.5" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- The "E" — clean geometric bars -->
  <g fill="#ffffff">
    <rect x="22" y="22" width="8" height="56" rx="2"/>
    <rect x="22" y="22" width="28" height="8" rx="2"/>
    <rect x="22" y="46" width="32" height="8" rx="2"/>
    <rect x="22" y="70" width="28" height="8" rx="2"/>
  </g>

  <!-- Signal source dot at end of middle bar -->
  <circle cx="60" cy="50" r="3.6" fill="url(#echoSignal)" filter="url(#echoGlow)"/>

  <!-- Three radiating echo arcs -->
  <g fill="none" stroke="url(#echoSignal)" stroke-width="2.6" stroke-linecap="round">
    <path d="M 67 44 a 8 8 0 0 1 0 12" opacity="0.95"/>
    <path d="M 73 38 a 16 16 0 0 1 0 24" opacity="0.75"/>
    <path d="M 79 32 a 24 24 0 0 1 0 36" opacity="0.55"/>
  </g>
</svg>
